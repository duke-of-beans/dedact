      template: true

# PROJECT STRUCTURE
directory_structure:
  root: "D:/Dev/dedact/"
  structure:
    - docs/ (all .md documentation)
    - src/ (all source code)
      - ingestion/
      - detection/
      - extraction/
      - analysis/
      - storage/
      - integration/
      - utils/
      - config/
      - models/
      - cli/
    - config/ (YAML configuration files)
    - tests/ (test suite)
    - integrations/ (project-specific integration configs)
    - data/ (sample data for testing)
    - scripts/ (utility scripts)
    - logs/ (processing logs, not in git)
    - output/ (generated outputs, not in git)

# BUILD TRACKING
build_status:
  phase_1_foundation:
    completion: 100%
    files_complete: 4
