# DEDACT Component Manifest
# Complete Registry of All System Components
# Version: 1.0.0
# Created: 2025-02-03

manifest_version: "1.0.0"
dedact_version: "1.0.0"
status: "Foundation Phase"

# PHASE 1: FOUNDATION DOCUMENTS (COMPLETE)
foundation:
  source_of_truth:
    - file: "DEDACT_DNA.yaml"
      status: COMPLETE
      purpose: "Project identity, core principles, locked decisions"
      dependencies: []
    
    - file: "DEDACT_PROTOCOLS.md"
      status: COMPLETE
      purpose: "Complete methodology for redaction recovery"
      dependencies: ["DEDACT_DNA.yaml"]
    
    - file: "RESEARCH_INTEGRATION.md"
      status: COMPLETE
      purpose: "Global positioning and cross-project architecture"
      dependencies: ["DEDACT_DNA.yaml", "DEDACT_PROTOCOLS.md"]
    
    - file: "DEDACT_MANIFEST.yaml"
      status: COMPLETE
      purpose: "Component registry and build tracker"
      dependencies: ["DEDACT_DNA.yaml"]

# PHASE 2: ARCHITECTURE (PENDING)
architecture:
  technical_design:
    - file: "SYSTEM_ARCHITECTURE.md"
      status: PENDING
      purpose: "Technical design, module specifications, data flow"
      dependencies: ["DEDACT_PROTOCOLS.md", "RESEARCH_INTEGRATION.md"]
      components:
        - overview_diagrams
        - module_specifications
        - data_flow_architecture
        - technology_stack_details
        - integration_interfaces
    
    - file: "MODULE_SPECIFICATIONS.md"
      status: PENDING
      purpose: "Detailed specs for every component"
      dependencies: ["SYSTEM_ARCHITECTURE.md"]
      components:
        - ingestion_module
        - detection_module
        - extraction_module
        - analysis_module
        - storage_module
        - integration_module
    
    - file: "DATA_FLOW.md"
      status: PENDING
      purpose: "How data moves through the system"
      dependencies: ["SYSTEM_ARCHITECTURE.md", "MODULE_SPECIFICATIONS.md"]
      components:
        - pipeline_diagrams
        - state_transitions
        - checkpoint_strategy
        - error_handling_flows

  supporting_docs:
    - file: "API_REFERENCE.md"
      status: PENDING
      purpose: "Programmatic interface documentation"
      dependencies: ["MODULE_SPECIFICATIONS.md"]
    
    - file: "CONFIGURATION_GUIDE.md"
      status: PENDING
      purpose: "All configuration options explained"
      dependencies: ["SYSTEM_ARCHITECTURE.md"]
    
    - file: "DATABASE_SCHEMA.md"
      status: PENDING
      purpose: "PostgreSQL and Neo4j schema definitions"
      dependencies: ["SYSTEM_ARCHITECTURE.md"]

# PHASE 3: DEVELOPMENT (PENDING)
development:
  core_modules:
    - module: "ingestion"
      path: "src/ingestion/"
      status: PENDING
      dependencies: []
      files:
        - file_discovery.py
        - quality_assessment.py
        - deduplication.py
        - format_detection.py
      tests:
        - test_ingestion.py
    
    - module: "detection"
      path: "src/detection/"
      status: PENDING
      dependencies: ["ingestion"]
      files:
        - visual_layer_analysis.py
        - text_layer_analysis.py
        - redaction_correlation.py
        - confidence_scoring.py
      tests:
        - test_detection.py
    
    - module: "extraction"
      path: "src/extraction/"
      status: PENDING
      dependencies: ["detection"]
      files:
        - direct_text_recovery.py
        - ocr_processing.py
        - metadata_extraction.py
        - fragment_reconstruction.py
      tests:
        - test_extraction.py
    
    - module: "analysis"
      path: "src/analysis/"
      status: PENDING
      dependencies: ["extraction"]
      files:
        - entity_recognition.py
        - pattern_matching.py
        - relationship_mapping.py
        - network_construction.py
      tests:
        - test_analysis.py
    
    - module: "storage"
      path: "src/storage/"
      status: PENDING
      dependencies: ["analysis"]
      files:
        - database_loaders.py
        - export_generators.py
        - cross_corpus_integration.py
      tests:
        - test_storage.py
    
    - module: "integration"
      path: "src/integration/"
      status: PENDING
      dependencies: ["storage"]
      files:
        - mcp_integration.py
        - external_db_connectors.py
        - entity_resolution.py
      tests:
        - test_integration.py

  supporting_code:
    - file: "src/utils/logging_config.py"
      status: PENDING
      purpose: "Comprehensive logging framework"
    
    - file: "src/utils/error_handling.py"
      status: PENDING
      purpose: "Error classification and handling"
    
    - file: "src/utils/checkpoint_manager.py"
      status: PENDING
      purpose: "Checkpoint and recovery system"
    
    - file: "src/config/config_loader.py"
      status: PENDING
      purpose: "Configuration file parsing and validation"
    
    - file: "src/models/data_models.py"
      status: PENDING
      purpose: "Data classes for all entities"

  cli_interface:
    - file: "src/cli/dedact.py"
      status: PENDING
      purpose: "Main CLI entry point"
      commands:
        - process (process documents)
        - analyze (run analysis on existing data)
        - export (generate exports)
        - status (check processing status)
        - config (manage configuration)
    
    - file: "src/cli/commands/"
      status: PENDING
      purpose: "Individual command implementations"
      files:
        - process_cmd.py
        - analyze_cmd.py
        - export_cmd.py
        - status_cmd.py
        - config_cmd.py

  configuration:
    - file: "config/default.yaml"
      status: PENDING
      purpose: "Default configuration"
    
    - file: "config/crisis_capitalism.yaml"
      status: PENDING
      purpose: "Crisis Capitalism project config"
    
    - file: "config/epstein_corpus.yaml"
      status: PENDING
      purpose: "Epstein corpus project config"
    
    - file: "config/hirm.yaml"
      status: PENDING
      purpose: "HIRM research project config"

  testing:
    - directory: "tests/"
      status: PENDING
      structure:
        - unit/ (module-level tests)
        - integration/ (workflow tests)
        - fixtures/ (test data)
        - performance/ (benchmarks)
    
    - file: "tests/conftest.py"
      status: PENDING
      purpose: "Pytest configuration and fixtures"
    
    - file: "tests/test_data/sample_redacted.pdf"
      status: PENDING
      purpose: "Test document with known redactions"

  infrastructure:
    - file: "requirements.txt"
      status: PENDING
      purpose: "Python dependencies"
      dependencies:
        - PyPDF2
        - pdf2image
        - pytesseract
        - spacy
        - psycopg2-binary
        - neo4j
        - pyyaml
        - click
        - pytest
    
    - file: "setup.py"
      status: PENDING
      purpose: "Package installation configuration"
    
    - file: ".gitignore"
      status: PENDING
      purpose: "Git ignore patterns"
    
    - file: "README.md"
      status: PENDING
      purpose: "Project overview and quick start"

