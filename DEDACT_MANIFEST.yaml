# DEPENDENCIES
external_dependencies:
  required:
    - Python: ">=3.10"
    - Tesseract OCR: ">=5.0"
    - PostgreSQL: ">=14.0"
    - Neo4j Community: ">=5.0"
  
  optional:
    - Elasticsearch: ">=8.0"
    - ExifTool: ">=12.0"
    - Google Cloud Vision API: "for enhanced OCR"

# DEPLOYMENT TARGETS
deployment:
  local_development:
    os: "Windows 11"
    location: "D:/Dev/dedact/"
    status: ACTIVE
  
  production_processing:
    os: "Windows 11 / Linux"
    location: "TBD"
    status: PLANNED

# VERSIONING STRATEGY
versioning:
  current: "1.0.0"
  strategy: "Semantic (MAJOR.MINOR.PATCH)"
  milestones:
    "1.0.0": "Foundation complete, architecture designed"
    "1.1.0": "Core extraction engine operational"
    "1.2.0": "Entity extraction and network analysis"
    "1.3.0": "Database integration complete"
    "1.4.0": "Crisis Capitalism integration"
    "1.5.0": "Epstein corpus Phase 1 processing"
    "2.0.0": "Multi-corpus processing, advanced analytics"

# QUALITY GATES
quality_standards:
  documentation:
    - every_module_documented: REQUIRED
    - api_reference_complete: REQUIRED
    - user_guide_available: REQUIRED
  
  code:
    - type_hints: REQUIRED
    - docstrings: REQUIRED
    - unit_tests: REQUIRED (>80% coverage)
    - integration_tests: REQUIRED
  
  performance:
    - benchmark_suite: REQUIRED
    - memory_profiling: REQUIRED
    - scalability_testing: REQUIRED

# MAINTENANCE
maintenance:
  update_frequency: "As needed during development"
  review_cycle: "Weekly during active development"
  deprecation_policy: "12 month notice minimum"

# CONTACT
project_owner:
