# Crisis Capitalism Project Configuration
# Specialized config for congressional trading, defense contracts, etc.

corpus_id: "crisis_capitalism"
corpus_path: "D:/Research/FINE PRINT/crisis capitalism/"

processing:
  confidence_threshold: 0.60
  ocr_enabled: true
  parallel_workers: 8
  extraction_depth: "comprehensive"

entity_types:
  - PERSON       # Executives, politicians, traders
  - ORG          # Companies, agencies, institutions
  - GPE          # Countries, cities, states
  - MONEY        # Dollar amounts, payments
  - DATE         # Transaction dates, filing dates
  - STOCK_SYMBOL # Trading symbols
  - PHONE        # Contact information
  - EMAIL        # Communication

focus_areas:
  - congressional_trading
  - defense_contracts
  - healthcare_mergers
  - regulatory_capture

network_analysis:
  enabled: true
  relationship_types:
    - EMPLOYS
    - OWNS
    - PAYS
    - TRADES
    - BOARD_MEMBER
    - OWNS_STOCK

output:
  formats:
    - json
    - csv
    - neo4j_cypher
  directory: "output/crisis_capitalism"

integration:
  mcp_server: true
  external_dbs:
    - opencorporates
    - littlesis
    - wikidata
